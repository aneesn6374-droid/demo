<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Find Your Account</title>
 
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }
 
        .main-container {
            width: 400px;
            margin: 80px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
 
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
 
        .radio-container {
            margin-bottom: 20px;
        }
 
        .radio-container label {
            display: block;
            margin-bottom: 15px;
            font-size: 16px;
            color: #444;
            cursor: pointer;
        }
 
        .radio-container input[type="radio"] {
            margin-right: 10px;
        }
 
        #api {
            margin-top: 20px;
        }
 
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: #0078d4;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
 
        button:hover {
            background: #005ea6;
        }
    </style>
</head>
 
<body>
 
<div class="main-container">
 
    <h2>Find Your Account</h2>
 
    <!-- Azure AD B2C injects controls here -->
    <div id="api"></div>
 
</div>
 
</body>
</html>
